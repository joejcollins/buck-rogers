site_name: Literate Programming
site_description: Literate programming examples and resources using Python.
site_author: Joe Collins
repo_url: https://joejcollins.github.io/buck-rogers/
theme:
  name: readthedocs

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
